<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Library</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="header-section">
            <div class="logo-heading">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960"><path d="M80-160v-80h800v80H80Zm80-160v-320h80v320h-80Zm160 0v-480h80v480h-80Zm160 0v-480h80v480h-80Zm280 0L600-600l70-40 160 280-70 40Z"/></svg>
                <h5>Digital Libary</h5>
            </div>
            <div class="header-button">
                <button type="button" id = "add-book">Add Book</button>
            </div>
        </div>
        <div class="main-content"></div>
    </div>
    <dialog id="add-book-dialog">
        <form action="" method="post" id="add-book-form">
            <div class="form-heading"><h5>Add your Book</h5></div>
            <div id="book-title">
                <label for="book_title">Title</label>
                <input type="text" name="book_title" class="input-fields" id="book_title" required placeholder="Frankenstein">
            </div>
            <div id="book-author">
                <label for="book_author">Author</label>
                <input type="text" name="book_author" class="input-fields" id="book_author" required placeholder="Mary Shelly">
            </div>
            <div id="book-pages">
                <label for="book_pages">Pages</label>
                <input type="number" name="book_pages" class="input-fields" id="book_pages" required placeholder="200">
            </div>
            <div id="read-check">
                <label for="read_check">Read</label>
                <input type="checkbox" name="read_check" id="read_check">
            </div>
            <div class="dialog-btn-box">
                <button type="submit" id="submit-btn">Submit</button>
                <button type="button" id="cancel-btn">Cancel</button>
            </div>
        </form>
    </dialog>
</body>
</html>
